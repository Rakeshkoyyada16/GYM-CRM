<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GymFlow CRM — Professional Gym Management System" />
    <meta name="theme-color" content="#4361ee" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('gymflow-theme')
          const theme = ['light', 'dark', 'system'].includes(storedTheme || '') ? storedTheme : 'system'
          const resolvedTheme = theme === 'system'
            ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme
          document.documentElement.classList.add(resolvedTheme)
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = resolvedTheme
        } catch {
          document.documentElement.classList.add('light')
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>GymFlow CRM</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
